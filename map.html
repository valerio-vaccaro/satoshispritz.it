<!DOCTYPE html>
<html lang="it">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Mappa Satoshi Spritz</title>
	<meta name="description" content="Mappa dei gruppi Satoshi Spritz e dei meetup Bitcoin-only attivi in Italia e in Svizzera.">
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css" integrity="sha256-sA+zWATbFveLLNqWO2gtiw3HL/lh1giY/Inf1BJ0z14=" crossorigin="">
	<script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js" integrity="sha256-o9N1jGDZrf5tS+Ft4gbIK7mYMipq9lqpVJ91xHSyKhg=" crossorigin=""></script>
	<style>
		html, body, #map { width: 100%; height: 100%; margin: 0; background: #090b0f; }
		.leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #111720; color: #f7f4ee; box-shadow: 0 12px 28px rgba(0, 0, 0, 0.42); }
		.leaflet-popup-content a, .leaflet-control-attribution a { color: #ffb14a; font-weight: 700; }
		.leaflet-control-attribution { background: rgba(9, 11, 15, 0.78); color: #b8b2a8; }
	</style>
</head>
<body>
<div id="map"></div>
<script>
	const map = L.map('map').setView([45.28, 9.11], 5);
	L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>, tiles &copy; Humanitarian OpenStreetMap Team'
	}).addTo(map);

	fetch('./spritz-data.json')
		.then((response) => {
			if (!response.ok) throw new Error('Unable to load Satoshi Spritz data');
			return response.json();
		})
		.then((spritzEntries) => {
			spritzEntries
				.filter((entry) => entry.row_type === 'group' && entry.latitude && entry.longitude)
				.forEach((entry) => {
					const marker = L.marker([Number(entry.latitude), Number(entry.longitude)]).addTo(map);
					const popup = document.createElement('div');
					const title = document.createElement('b');
					title.textContent = `Satoshi Spritz ${entry.name}`;
					popup.append(title, document.createElement('br'));

					const telegram = document.createElement('a');
					telegram.href = entry.telegram_url;
					telegram.target = '_blank';
					telegram.rel = 'noopener noreferrer';
					telegram.textContent = entry.telegram_label;
					popup.append(telegram);
					marker.bindPopup(popup);
				});
		})
		.catch((error) => console.error(error));
</script>
</body>
</html>
